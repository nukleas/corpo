name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm typecheck

      - run: pnpm build-storybook

      - uses: actions/upload-artifact@v4
        with:
          name: storybook-static
          path: packages/react-corpo/storybook-static
          retention-days: 14

      - uses: actions/upload-artifact@v4
        with:
          name: package-dist
          path: |
            packages/corpo/dist
            packages/react-corpo/dist
          retention-days: 14
