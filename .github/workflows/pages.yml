name: Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm build-storybook

      - name: Assemble site
        run: |
          set -e
          mkdir -p pages_dist/dist pages_dist/demo pages_dist/console
          cp site/index.html pages_dist/index.html
          cp -r packages/corpo/dist/. pages_dist/dist/
          cp packages/corpo/test/index.html pages_dist/demo/index.html
          cp packages/corpo/examples/console.html pages_dist/console/index.html
          cp -r packages/react-corpo/storybook-static pages_dist/storybook

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: pages_dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
